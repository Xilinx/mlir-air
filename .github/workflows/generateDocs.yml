name: Generate Github Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs:
    name: Generate Documentation
    runs-on: ubuntu-22.04    
    
    # contents: write for the Pages deployment; actions: read to download the
    # latest nightly LLM perf artifact from nightlyPerfBenchmark.yml.
    permissions:
      contents: write
      actions: read

    steps:
      - name: Configure Environment
        run: echo "$GITHUB_WORKSPACE/llvm/install/bin" >> $GITHUB_PATH

      # Clone the repo and its submodules. Do shallow clone to save clone
      # time.
      - name: Get repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 2
          submodules: "true"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang lld
      
      - name: Install Ninja
        uses: llvm/actions/install-ninja@55d844821959226fab4911f96f37071c1d4c3268

      - name: Get Submodule Hash
        id: get-submodule-hash
        run: echo "::set-output name=hash::$(md5sum $(echo utils/clone-mlir-aie.sh))"
        shell: bash

      - name: Ccache for C++ compilation
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-generatedocs-${{ steps.get-submodule-hash.outputs.hash }}
          max-size: 1G

      - name: Build and Install libxaie
        run: utils/github-clone-build-libxaie.sh

      - name: Get mlir-aie
        run: utils/clone-mlir-aie.sh

      - name: Build and install mlir-aie
        id: build-aie
        run: |
          pushd mlir-aie
          pip install -r python/requirements.txt
          pip install -r python/requirements_ml.txt
          pip install -r python/requirements_dev.txt

          LLVM_VERSION=$(utils/clone-llvm.sh --get-wheel-version)
          echo "LLVM_PROJECT_VERSION=${LLVM_VERSION}" | tee -a $GITHUB_OUTPUT

          pip -q download mlir==$LLVM_VERSION \
            -f https://github.com/Xilinx/mlir-aie/releases/expanded_assets/mlir-distro
          unzip -q mlir-*.whl
          find mlir -exec touch -a -m -t 201108231405.14 {} \;

          MLIR_AIE_VERSION=`git rev-parse HEAD`
          echo "MLIR_AIE_COMMIT=${MLIR_AIE_VERSION}" | tee -a $GITHUB_OUTPUT

          popd

          utils/github-build-mlir-aie.sh

      # Pull perf.json from the most recent nightly LLM benchmark that produced
      # an artifact so generate_readme.py can render the "Nightly LLM Benchmark"
      # section. We intentionally do NOT filter on run conclusion: a run where a
      # model failed verify goes red but still uploads a perf.json (if:always),
      # and that partial/failed state is exactly what we want on the dashboard —
      # filtering to success-only would instead show stale passing data and hide
      # the failure. Runs that died before producing an artifact (e.g. build
      # broke) are skipped in favor of the next one. Never fails the docs build:
      # if nothing is downloadable, the section is simply omitted.
      - name: Fetch latest nightly LLM perf
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for RID in $(gh run list --repo ${{ github.repository }} \
              --workflow nightlyPerfBenchmark.yml -L 8 \
              --json databaseId --jq '.[].databaseId'); do
            echo "Trying perf artifact from nightly run $RID..."
            if gh run download "$RID" --repo ${{ github.repository }} \
                 --name "perf-$RID" --dir /tmp/llmperf 2>/dev/null; then
              echo "Using perf artifact from run $RID"
              break
            fi
          done
          test -f /tmp/llmperf/perf.json \
            && echo "perf.json fetched" \
            || echo "no nightly perf artifact available; LLM section will be omitted"

      # Build the repo test target in release mode to build and test.
      - name: Build Docs
        run: |
          mkdir build_release
          pushd build_release
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DCMAKE_MODULE_PATH=`pwd`/../mlir-aie/cmake/modulesXilinx \
            -DMLIR_DIR=`pwd`/../mlir-aie/mlir/lib/cmake/mlir/ \
            -DLLVM_DIR=`pwd`/../mlir-aie/mlir/lib/cmake/llvm/ \
            -DAIE_DIR=`pwd`/../mlir-aie/install/lib/cmake/aie/ \
            -DCMAKE_LINKER=lld \
            -DLLVM_EXTERNAL_LIT=`pwd`/../llvm/build/bin/llvm-lit \
            -DAIR_BUILD_RUNTIME=OFF
          make docs
          popd
          cp -r docs/* build_release/docs
          for file in `find platforms/xilinx* -maxdepth 1 -name 'README.md'`
          do
            platform=`echo $file | cut -d'/' -f2`
            mkdir -p build_release/docs/platforms/$platform
            cp platforms/$platform/*.md build_release/docs/platforms/$platform
          done
          mkdir -p build_release/docs/programming_examples
          python3 programming_examples/generate_readme.py \
            --output build_release/docs/programming_examples/index.md \
            --base-url https://github.com/Xilinx/mlir-air/tree/main/programming_examples/ \
            --llm-perf /tmp/llmperf/perf.json

      - name: Save LLVM Version
        run: |
          LLVM_VER="${{ steps.build-aie.outputs.LLVM_PROJECT_VERSION }}"
          AIE_VER="${{ steps.build-aie.outputs.MLIR_AIE_COMMIT }}"
          
          echo "{" > ./build_release/docs/build_info.json
          echo "llvm-version: \"${LLVM_VER}\"," >> ./build_release/docs/build_info.json
          echo "mlir-aie-version: \"${AIE_VER}\"," >> ./build_release/docs/build_info.json
          echo "}" > ./build_release/docs/build_info.json

      - name: Publish to github-pages
        uses: peaceiris/actions-gh-pages@v3.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build_release/docs
          enable_jekyll: true

