#
# Nightly LLM end-to-end performance benchmark on the dedicated Krackan Point
# runner (Ryzen AI 5 PRO 340, label `amdryzenai5pro340`). Builds mlir-air once,
# then for every model in BENCH_MODELS runs the correctness gate (verify) and
# captures perf (profile), collecting TTFT + decode tok/s into perf.json and
# uploading it as an artifact. Kept out of the per-PR matrix so perf numbers are
# contention-free. The job goes red if any model's compile/verify fails.

name: Nightly LLM Perf Benchmark

on:
  schedule:
    - cron: '17 4 * * *'  # Daily at 04:17 (off-:00 to avoid CI fleet pile-up)
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: nightly-perf-benchmark
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  XILINXD_LICENSE_FILE: /opt/xilinx/Xilinx.lic
  VITIS: /opt/ryzen_ai-1.3.0.1/vitis_aie_essentials
  # The lit/ninja targets run every llms/*/run_npu2_{verify,profile} model. The
  # 3B/4B models used to OOM-kill this ~32GB runner (their verify held the HF
  # bf16 reference + NPU host weights simultaneously). They now fit: the runtime
  # weight preload shares prefill activation-scratch BOs across layers and drops
  # the host numpy weight duplicates once resident in BOs, and verify runs the
  # NPU-capture and HF-compare phases as separate subprocesses so the reference
  # never coexists with the NPU peak. Measured verify peaks: llama32_3b ~24GB,
  # qwen25_3b ~25GB, qwen3_4b ~27GB. No LIT_FILTER_OUT needed.

jobs:
  benchmark:
    name: LLM perf benchmark
    runs-on: amdryzenai5pro340
    # actions: write so the final step can dispatch generateDocs.yml to refresh
    # the GitHub Pages LLM benchmark section with this run's perf.json artifact.
    permissions:
      contents: read
      actions: write
    # Bound total runtime so stuck NPU dispatch/downloads can't occupy the
    # dedicated runner indefinitely. Covers a full build + all models (each
    # model is also individually bounded by `timeout` in run_models.sh).
    timeout-minutes: 300

    steps:

      - uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: Setup environment
        run: |
          python3.12 -m venv air-venv
          source air-venv/bin/activate
          pip cache purge
          pip install --upgrade pip
          pip install lit cmake joblib
          pip install --pre torch-mlir torchvision \
            --index-url https://download.pytorch.org/whl/nightly/cpu \
            -f https://github.com/llvm/torch-mlir-release/releases/expanded_assets/dev-wheels

      - name: Get mlir-aie
        run: |
          utils/clone-mlir-aie.sh
          source air-venv/bin/activate
          pushd mlir-aie
          pip install -r python/requirements.txt
          pip install -r python/requirements_ml.txt
          pip install "torchvision==0.27.1+cpu" --index-url https://download.pytorch.org/whl/cpu
          pip install -r python/requirements_dev.txt

          VERSION=$(utils/clone-llvm.sh --get-wheel-version)
          pip -q download mlir==$VERSION \
            -f https://github.com/Xilinx/mlir-aie/releases/expanded_assets/mlir-distro
          unzip -q mlir-*.whl
          find mlir -exec touch -a -m -t 201108231405.14 {} \;

          popd

      - name: Install mlir-aie from wheel
        run: |
          source air-venv/bin/activate
          MLIR_AIE_VERSION=$(utils/clone-mlir-aie.sh --get-wheel-version)
          pip install mlir_aie==$MLIR_AIE_VERSION \
            -f https://github.com/Xilinx/mlir-aie/releases/expanded_assets/latest-wheels-4/

      - name: Get llvm-aie
        run: |
          source air-venv/bin/activate
          python3 -m pip install --upgrade --force-reinstall llvm-aie -f https://github.com/Xilinx/llvm-aie/releases/expanded_assets/nightly

      - name: Build mlir-air
        run: |
          source air-venv/bin/activate

          export PATH=$VITIS/bin:$VITIS/aietools/bin:$PATH
          source /opt/xilinx/xrt/setup.sh

          WHL_MLIR_DIR=$(pwd)/mlir-aie/mlir
          MLIR_AIE_INSTALL_DIR="$(python3 -m pip show mlir_aie | grep ^Location: | awk '{print $2}')/mlir_aie"
          PEANO_INSTALL_DIR=$(python3 -m pip show llvm-aie | grep ^Location: | awk '{print $2}')/llvm-aie
          CMAKEMODULES_DIR=$(pwd)/mlir-aie/cmake/modulesXilinx

          mkdir -p build_assert
          pushd build_assert

          sudo prlimit -lunlimited --pid $$

          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DPython3_EXECUTABLE=$(which python) \
            -DCMAKE_INSTALL_PREFIX=$PWD/../install \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_ASM_COMPILER=clang \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_MODULE_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_SHARED_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_MODULE_PATH=${CMAKEMODULES_DIR}/ \
            -DLLVM_EXTERNAL_LIT=$(which lit) \
            -DLLVM_DIR=${WHL_MLIR_DIR}/lib/cmake/llvm \
            -DMLIR_DIR=${WHL_MLIR_DIR}/lib/cmake/mlir \
            -DAIE_DIR=${MLIR_AIE_INSTALL_DIR}/lib/cmake/aie \
            -Dx86_64_TOOLCHAIN_FILE=$PWD/../cmake/modules/toolchain_x86_64.cmake \
            -DAIR_RUNTIME_TARGETS:STRING="x86_64" \
            -DXRT_ROOT=/opt/xilinx/xrt \
            -DENABLE_RUN_XRT_TESTS=ON \
            -DPEANO_INSTALL_DIR=${PEANO_INSTALL_DIR}
          ninja install

          pip install $PWD/../python/spensor
          popd

      - name: Verify + profile all models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Force the classic HTTPS CDN download path (forwarded into lit tests
          # by programming_examples/lit.cfg.py). The hf_xet backend stalls at 0%
          # on this runner (Xet CAS endpoint unreachable).
          HF_HUB_DISABLE_XET: "1"
          # Serve weights from the runner's persistent HF cache without any
          # network access. The runner's HF egress is flaky (intermittent
          # "Connection reset by peer"), and from_pretrained does a network HEAD
          # even for cached files; offline mode skips it. Seed/refresh the cache
          # via the manual "Download LLM Weights" workflow (downloadLLMWeights.yml)
          # before running this. Forwarded into lit tests by lit.cfg.py.
          HF_HUB_OFFLINE: "1"
        run: |
          source air-venv/bin/activate
          export PATH=$VITIS/bin:$VITIS/aietools/bin:$PATH
          source /opt/xilinx/xrt/setup.sh

          # Raise memlock: the NPU driver mmaps ~64MB of locked memory; the
          # default RLIMIT_MEMLOCK makes that fail with EAGAIN, breaking device
          # detection and NPU dispatch. Each GHA step is a fresh shell.
          sudo prlimit -lunlimited --pid $$

          # Install every model's Python deps (transformers/safetensors/torch/
          # huggingface_hub) — the lit-run inference imports them.
          for req in programming_examples/llms/*/requirements.txt; do
            pip install -q -r "$req"
          done

          # Run all models through the maintained lit/ninja targets (lit injects
          # the AIE tool env from the CMake build). lit runs every model even if
          # one fails, so a run reports each model's status; ninja returns
          # non-zero if any failed. Per-model wall time is bounded via LIT_OPTS.
          rc=0
          pushd build_assert
          # Correctness gate (strict): red if any model's verify fails.
          LIT_OPTS="--timeout 1800 --xunit-xml-output $OLDPWD/verify.xml" \
            ninja check-programming-examples-llms-verify || rc=1
          # Perf capture: writes <model>.perf.json under test/llms/<model>/.
          LIT_OPTS="--timeout 1800" \
            ninja check-programming-examples-llms-profile || rc=1
          popd
          exit $rc

      - name: Combine perf JSON
        if: always()
        run: |
          source air-venv/bin/activate
          MLIR_AIE_HASH=$(awk -F= '$1 ~ /(^| )HASH$/ {print $2; exit}' utils/clone-mlir-aie.sh)
          # Fail fast if the script stopped emitting HASH=... (drift), rather
          # than silently publishing perf results with an empty toolchain hash.
          if [ -z "$MLIR_AIE_HASH" ]; then
            echo "ERROR: could not parse HASH from utils/clone-mlir-aie.sh" >&2
            exit 1
          fi
          LLVM_AIE_VERSION=$(python3 -m pip show llvm-aie | awk '/^Version:/{print $2}')
          mkdir -p perf_out
          python3 - "$MLIR_AIE_HASH" "$LLVM_AIE_VERSION" "${{ github.sha }}" <<'PY'
          import datetime, glob, json, os, re, shutil, sys
          import xml.etree.ElementTree as ET

          aie_hash, peano_ver, air_sha = sys.argv[1], sys.argv[2], sys.argv[3]

          # Per-model verify status from the verify xunit output. A model may
          # contribute several run_npu2_verify* lits (e.g. int4 ships a skipped
          # REQUIRES:false one plus a passing bfp16-prefill one); collapse with
          # precedence fail > pass > skip so a real result beats a skip.
          vstatus = {}
          rank = {"skip": 0, "pass": 1, "fail": 2}
          if os.path.exists("verify.xml"):
              for tc in ET.parse("verify.xml").getroot().iter("testcase"):
                  name = (tc.get("classname") or "") + " " + (tc.get("name") or "")
                  # xunit stores the dir in classname (…llms/<model>) and the lit
                  # in name (run_npu2_verify.lit), joined here by a space — so the
                  # separator before run_npu2_verify is " " or "/".
                  m = re.search(r"llms/([^/ ]+)[ /]run_npu2_verify", name)
                  if not m:
                      continue
                  if next(tc.iter("failure"), None) is not None:
                      st = "fail"
                  elif next(tc.iter("skipped"), None) is not None:
                      st = "skip"
                  else:
                      st = "pass"
                  model = m.group(1)
                  prev = vstatus.get(model)
                  if prev is None or rank[st] > rank[prev]:
                      vstatus[model] = st

          recs = []
          for f in sorted(glob.glob("build_assert/test/llms/**/*.perf.json", recursive=True)):
              d = json.load(open(f))
              d["runner"] = "amdryzenai5pro340"
              d["toolchain"] = {
                  "mlir_air_sha": air_sha,
                  "mlir_aie_hash": aie_hash,
                  "llvm_aie_version": peano_ver,
              }
              d["verify_status"] = vstatus.get(d["model"], "")
              recs.append(d)
              prof = os.path.join(os.path.dirname(f), "profile.txt")
              if os.path.exists(prof):
                  shutil.copy(prof, f"perf_out/{d['model']}.profile.txt")

          # Surface models that ran verify but produced no profile record (their
          # profile compile/run failed): emit a null-metric row so the failure is
          # visible on the dashboard instead of the model silently disappearing.
          # Skip "skip" models (e.g. gated qwen3_4b) — those are intentionally
          # not benchmarked, not failures.
          profiled = {d["model"] for d in recs}
          now = (
              datetime.datetime.now(datetime.timezone.utc)
              .replace(microsecond=0)
              .isoformat()
              .replace("+00:00", "Z")
          )
          for model, st in vstatus.items():
              if model in profiled or st == "skip":
                  continue
              recs.append({
                  "model": model,
                  "timestamp_utc": now,
                  "runner": "amdryzenai5pro340",
                  "verify_status": st,
                  "metrics": {
                      "ttft_ms": None,
                      "decode_tokens_per_sec": None,
                      "context_len": None,
                  },
                  "toolchain": {
                      "mlir_air_sha": air_sha,
                      "mlir_aie_hash": aie_hash,
                      "llvm_aie_version": peano_ver,
                  },
                  "run_params": {"n_tokens": None, "prompt": None},
              })

          recs.sort(key=lambda r: r["model"])
          json.dump(recs, open("perf.json", "w"), indent=2)
          print(json.dumps(recs, indent=2))
          PY

      - name: Job summary
        if: always()
        run: |
          source air-venv/bin/activate
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os
          recs = json.load(open("perf.json")) if os.path.exists("perf.json") else []
          print("### LLM perf benchmark\n")
          if not recs:
              print("**No results produced** — see step logs.")
          else:
              print("| model | verify | ctx | TTFT (ms) | tok/s |")
              print("| --- | --- | --- | --- | --- |")
              for d in sorted(recs, key=lambda r: r["model"]):
                  m = d["metrics"]
                  print(f"| {d['model']} | {d['verify_status'] or '?'} | "
                        f"{m.get('context_len') or '?'} | "
                        f"{m['ttft_ms']} | {m['decode_tokens_per_sec']} |")
          PY

      - name: Upload perf artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ github.run_id }}
          path: |
            perf.json
            perf_out/
            verify.xml

      # Refresh the GitHub Pages docs so the "Nightly LLM Benchmark" section
      # picks up this run's perf.json. generateDocs.yml downloads the latest
      # nightly artifact (any conclusion) when it regenerates the page. Runs
      # whenever a perf.json was produced (even a partial run), not gated on the
      # job's overall result. Best-effort: never fails the benchmark job if the
      # gh CLI is missing on the runner or the dispatch call errors.
      - name: Refresh docs page
        if: always() && hashFiles('perf.json') != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI not available; skipping docs refresh dispatch"
            exit 0
          fi
          gh workflow run generateDocs.yml --repo ${{ github.repository }} --ref main \
            || echo "generateDocs dispatch failed; page will refresh on next push/nightly"
